services:
  - type: web
    name: teranga
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn server:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: MODEL
        value: anthropic/claude-sonnet-4-6
      - key: PRESENTER_MODEL
        value: anthropic/claude-haiku-4-5
      - key: SERPER_API_KEY
        sync: false
      - key: TAVILY_API_KEY
        sync: false
